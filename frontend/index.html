<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesion | Taller Mecanico</title>
  <link rel="icon" href="assets/img/logo-temp.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
</head>
<body>

  <div class="login-page">
    <div class="login-container">

      <!-- Logo -->
      <div class="login-logo">
        <img src="assets/img/logo-temp.svg" alt="Logo Taller">
        <h1>Taller Mecanico</h1>
        <p>Sistema de Gestion Integral</p>
      </div>

      <!-- Alerta de error -->
      <div id="login-alert" class="alert alert-danger hidden">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="login-alert-msg">Error al iniciar sesion.</span>
      </div>

      <!-- Formulario -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Correo Electronico</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="usuario@taller.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contrasena</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Tu contrasena"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="form-group mt-lg">
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Iniciar Sesion
          </button>
        </div>
      </form>

      <p class="text-center mt-md" style="font-size: 0.75rem;">
        Sistema de uso interno. Acceso restringido al personal autorizado.
      </p>

    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="assets/js/auth.js"></script>
  <script>
    // Redirigir si ya hay sesion activa
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    const form     = document.getElementById('login-form');
    const alert    = document.getElementById('login-alert');
    const alertMsg = document.getElementById('login-alert-msg');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Mostrar estado de carga
      loginBtn.disabled    = true;
      loginBtn.textContent = 'Iniciando sesion...';
      alert.classList.add('hidden');

      try {
        const response = await fetch('http://localhost:3000/api/v1/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok || !data.exitoso) {
          throw new Error(data.mensaje || 'Credenciales incorrectas.');
        }

        // Guardar token y datos del usuario
        localStorage.setItem('token',   data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));

        // Redirigir al dashboard
        window.location.href = 'dashboard.html';

      } catch (error) {
        alert.classList.remove('hidden');
        alertMsg.textContent = error.message;
        loginBtn.disabled    = false;
        loginBtn.innerHTML   = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Iniciar Sesion
        `;
      }
    });
  </script>

</body>
</html>
