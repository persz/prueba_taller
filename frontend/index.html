<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taller Mecánico — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
</head>
<body>

  <div class="login-page">
    <div class="login-container">

      <!-- Logo y nombre -->
      <div class="login-logo">
        <img src="assets/img/logo-temp.svg" alt="Logo Taller" />
        <h1>Taller Mecánico</h1>
        <p>Sistema de Gestión Integral</p>
      </div>

      <!-- Alerta de error -->
      <div id="login-error" class="alert alert-danger hidden">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="login-error-msg">Credenciales incorrectas.</span>
      </div>

      <!-- Formulario -->
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="usuario@taller.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button id="btn-login" class="btn btn-primary btn-block btn-lg" style="margin-top: 8px;">
        <span id="btn-login-text">Iniciar Sesión</span>
        <div id="btn-login-spinner" class="spinner hidden" style="width:18px;height:18px;border-width:2px;"></div>
      </button>

      <p style="text-align:center; margin-top: 24px; font-size: 0.8rem;">
        Sistema exclusivo para personal autorizado
      </p>

    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api/v1';

    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnLogin      = document.getElementById('btn-login');
    const btnText       = document.getElementById('btn-login-text');
    const btnSpinner    = document.getElementById('btn-login-spinner');
    const errorBox      = document.getElementById('login-error');
    const errorMsg      = document.getElementById('login-error-msg');

    // Si ya hay sesion activa, redirigir al dashboard
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    function setLoading(loading) {
      btnLogin.disabled = loading;
      btnText.classList.toggle('hidden', loading);
      btnSpinner.classList.toggle('hidden', !loading);
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    function hideError() {
      errorBox.classList.add('hidden');
    }

    async function handleLogin() {
      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      hideError();

      if (!email || !password) {
        showError('Por favor completa todos los campos.');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok || !data.exitoso) {
          showError(data.mensaje || 'Error al iniciar sesión.');
          return;
        }

        // Guardar token y datos del usuario
        localStorage.setItem('token',   data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));

        window.location.href = 'dashboard.html';

      } catch (err) {
        showError('No se pudo conectar con el servidor. Verifica tu conexión.');
      } finally {
        setLoading(false);
      }
    }

    // Login con click
    btnLogin.addEventListener('click', handleLogin);

    // Login con Enter
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    emailInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') passwordInput.focus();
    });
  </script>

</body>
</html>
