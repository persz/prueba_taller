<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Taller Mecanico</title>
  <link rel="icon" href="assets/img/logo-temp.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
</head>
<body>

  <div class="app-layout">

    <!-- Overlay sidebar movil -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/img/logo-temp.svg" alt="Logo" class="sidebar-logo">
        <div class="sidebar-brand">
          Taller Mecanico
          <span>Sistema de Gestion</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>

        <div class="nav-item" data-view="dashboard" onclick="Router.navigate('dashboard')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </div>

        <div class="nav-item" data-view="ordenes" onclick="Router.navigate('ordenes')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Ordenes de Trabajo
        </div>

        <div class="nav-item" data-view="clientes" onclick="Router.navigate('clientes')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Clientes
        </div>

        <div class="nav-item" data-view="vehiculos" onclick="Router.navigate('vehiculos')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <rect x="1" y="3" width="15" height="13" rx="2"/>
            <path d="M16 8h4l3 5v3h-7V8z"/>
            <circle cx="5.5" cy="18.5" r="2.5"/>
            <circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
          Vehiculos
        </div>

        <div class="nav-item" data-view="inventario" onclick="Router.navigate('inventario')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
          Inventario
        </div>

        <div class="nav-item" data-view="facturas" onclick="Router.navigate('facturas')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
            <line x1="1" y1="10" x2="23" y2="10"/>
          </svg>
          Facturas
        </div>

        <!-- Solo admin -->
        <div id="nav-admin">
          <div class="nav-section-label">Administracion</div>

          <div class="nav-item" data-view="reportes" onclick="Router.navigate('reportes')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            Reportes
          </div>

          <div class="nav-item" data-view="usuarios" onclick="Router.navigate('usuarios')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Usuarios
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">A</div>
          <div class="user-details">
            <div class="user-name" id="user-name">Usuario</div>
            <div class="user-role" id="user-role">Rol</div>
          </div>
        </div>
        <button class="btn btn-secondary btn-block btn-sm" onclick="Auth.logout()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Cerrar Sesion
        </button>
      </div>
    </aside>

    <!-- Contenido principal -->
    <div class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <span class="topbar-title" id="topbar-title">Dashboard</span>
        </div>
      </header>

      <!-- Area de contenido dinamico -->
      <main class="content-area" id="content-area">
        <div class="flex-center" style="height: 300px;">
          <div class="spinner"></div>
        </div>
      </main>

    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>

  <!-- Toast utility -->
  <script>
    const Toast = {
      show(mensaje, tipo = 'info', duracion = 3500) {
        const container = document.getElementById('toast-container');
        const toast     = document.createElement('div');
        toast.className = `toast toast-${tipo}`;
        toast.textContent = mensaje;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), duracion);
      },
      success: (msg) => Toast.show(msg, 'success'),
      error:   (msg) => Toast.show(msg, 'error'),
      warning: (msg) => Toast.show(msg, 'warning'),
      info:    (msg) => Toast.show(msg, 'info'),
    };
  </script>

  <!-- Vistas -->
  <script>const Views = {};</script>
  <script src="assets/js/views/dashboard.js"></script>
  <script src="assets/js/views/clientes.js"></script>
  <script src="assets/js/views/vehiculos.js"></script>
  <script src="assets/js/views/inventario.js"></script>
  <script src="assets/js/views/ordenes.js"></script>
  <script src="assets/js/views/facturas.js"></script>
  <script src="assets/js/views/reportes.js"></script>
  <script src="assets/js/views/usuarios.js"></script>
  <script src="assets/js/router.js"></script>

  <script>
    // Verificar autenticacion
    if (!Auth.requireAuth()) {
      throw new Error('No autenticado');
    }

    // Cargar datos del usuario en el sidebar
    const usuario = Auth.getUsuario();
    document.getElementById('user-name').textContent  = usuario.nombre;
    document.getElementById('user-role').textContent  = usuario.rol === 'admin' ? 'Administrador' : 'Empleado';
    document.getElementById('user-avatar').textContent = usuario.nombre.charAt(0).toUpperCase();

    // Ocultar seccion admin si es empleado
    if (usuario.rol !== 'admin') {
      document.getElementById('nav-admin').classList.add('hidden');
    }

    // Toggle sidebar en movil
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    document.getElementById('menu-toggle').addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });

    // Inicializar router
    Router.init();
  </script>

</body>
</html>
